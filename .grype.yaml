# Grype config, auto-discovered by the CI image vuln scan (ci.yml).
# Add `ignore:` entries here only for vulnerabilities that are (a) confirmed
# not-yet-fixed in the pinned nixpkgs channel and (b) not exploitable in this
# image's usage — each with a justification and a removal condition.
#
# Example:
# ignore:
#   - vulnerability: CVE-XXXX-YYYYY
#     # why: <package> <version> in nixos-26.05 has no backported fix yet;
#     #      <not reachable in this image because …>. Remove when nixpkgs bumps.

ignore:
  # CVE-2026-34182 (Critical) + CVE-2026-45447 / 9076 / 7383 / 34180 / 42764 /
  # 34183 / 42765 / 45445 / 34181 (High) — openssl 3.6.2 issues, all fixed in
  # openssl 3.6.3. Reported by Grype because nixos-26.05 has not yet backported
  # the 3.6.3 release; the runtime closure still ships 3.6.2.
  #
  # Why ignored:
  #   - openssl is in the image for two consumers only:
  #       1. `curlSlim` (flake.nix `pkgs.curl.override`), which backs the OCI
  #          HEALTHCHECK CMD `curl -fsS http://localhost:3000/`. That call is
  #          plain HTTP to a literal localhost URL — no TLS handshake, and no
  #          attacker influence over arguments, protocol, headers, or response
  #          body. curlSlim further disables scp, gss, psl, brotli, zstd, ldap,
  #          rtmp, http3 and websocket support, removing most of the surface
  #          openssl-adjacent curl CVEs target.
  #       2. node's TLS stack. The server listens on plain HTTP :3000 (TLS is
  #          terminated by an upstream proxy in real deployments), so there is
  #          no attacker-facing TLS *server* surface; node's openssl is only
  #          exercised for outbound HTTPS the app itself initiates against
  #          trusted endpoints.
  #   - The container runs as `nonroot:65532` with :3000 as the only advertised
  #     ingress.
  #
  # Remove these entries when nixos-26.05 backports openssl 3.6.3+. Check via:
  #   nix eval --raw github:NixOS/nixpkgs/nixos-26.05#openssl.version
  - vulnerability: CVE-2026-34182
  - vulnerability: CVE-2026-45447
  - vulnerability: CVE-2026-9076
  - vulnerability: CVE-2026-7383
  - vulnerability: CVE-2026-34180
  - vulnerability: CVE-2026-42764
  - vulnerability: CVE-2026-34183
  - vulnerability: CVE-2026-42765
  - vulnerability: CVE-2026-45445
  - vulnerability: CVE-2026-34181

  # CVE-2026-11822 / CVE-2026-11824 (High) — sqlite 3.51.2 issues, both fixed
  # in sqlite 3.53.2. Reported by Grype because nixos-26.05 has not yet
  # backported the 3.53.2 release; the runtime closure still ships 3.51.2.
  #
  # Why ignored:
  #   - The application does not import `node:sqlite`, never opens a database,
  #     and parses no untrusted SQL — none of the affected code paths are
  #     reachable at runtime.
  #   - sqlite is in the closure only because `nodejs-slim` retains a reference
  #     to `sqlite-*-dev` (pkgconfig + headers). Node's built-in `node:sqlite`
  #     statically links sqlite into the `node` binary, so the standalone
  #     sqlite shared library is never loaded at runtime.
  #
  # Remove these entries when nixos-26.05 backports sqlite 3.53.2+. Check via:
  #   nix eval --raw github:NixOS/nixpkgs/nixos-26.05#sqlite.version
  - vulnerability: CVE-2026-11822
  - vulnerability: CVE-2026-11824
